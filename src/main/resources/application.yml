spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/notifications?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

async:
  executor:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 500
    thread-name-prefix: notif-worker-

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, scheduledtasks
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: notification-platform

logging:
  config: classpath:logback-spring.xml
